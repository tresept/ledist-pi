<!doctype html>
<html lang="ja">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LEDist</title></head>
<body>
<h1>LEDist</h1>
<label>車種 <select id="profile"></select></label>
<label>テンプレート <select id="template"></select></label>
<button id="load" type="button">テンプレートを読み込む</button>
<p id="status">車種を選択してください。</p>
<form id="form"></form>
<label>表示シナリオ <textarea id="program" spellcheck="false"></textarea></label>
<p><button id="apply" type="button">表示する</button> <button id="blank" type="button">消灯する</button> <button id="test" type="button">試験表示</button></p>
<p id="message"></p>
<script src="/app.js"></script>
</body>
</html>
