<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>LEDist</title></head>
<body>
  <h1>LEDist</h1>
  <p><label>車種<br><select id="profile"></select></label></p>
  <p id="status" role="status"></p>
  <h2>表示内容</h2>
  <form id="form"></form>
  <p><button id="apply" type="button">表示する</button> <button id="reset" type="button">選択をリセット</button> <button id="stop" type="button">停止する</button> <button id="blank" type="button">消灯する</button> <button id="test" type="button">テストパターンの表示</button></p>
  <h2>リアルタイムプレビュー</h2>
  <p><img id="preview" width="128" height="32" alt="現在LEDパネルに表示している内容"></p>
  <p id="message" role="status" aria-live="polite"></p>
  <script src="/app.js"></script>
</body></html>
